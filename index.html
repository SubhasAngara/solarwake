<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solarwake</title>
  <link rel="stylesheet" href="./src/styles.css">
</head>

<body>
  <div class="space-scene" aria-hidden="true">
    <div class="space-glow glow-one"></div>
    <div class="space-glow glow-two"></div>
    <div class="space-glow glow-three"></div>
    <div class="star-layer stars-slow"></div>
    <div class="star-layer stars-fast"></div>
    <div class="dust-field"></div>
    <img class="background-mascot mascot-drift" src="./assets/mascot-drift.png" alt="">
  </div>

  <main class="shell" id="app">
    <section class="home-view view is-active" aria-labelledby="home-title">
      <div class="home-panel">
        <div class="brand-lockup">
          <img class="brand-logo" src="./assets/solarwake-logo.png" alt="Solarwake" onload="this.nextElementSibling.hidden=true" onerror="this.hidden=true;this.nextElementSibling.hidden=false">
          <h1 class="brand-word" id="home-title">Solarwake</h1>
        </div>

        <nav class="home-actions" aria-label="Main menu">
          <button class="menu-button primary" type="button" id="playButton">Play mission</button>
          <button class="menu-button" type="button" id="tutorialButton">Tutorial</button>
          <button class="menu-button" type="button" id="aboutButton">About</button>
        </nav>

        <p class="info-note" id="infoNote" hidden></p>
      </div>
    </section>

    <section class="mission-view view" id="missionView" aria-labelledby="mission-title" hidden>
      <div class="mission-shell">
        <header class="mission-topbar">
          <button class="back-button" type="button" id="backButton">Back</button>
          <div>
            <p class="eyebrow">Select mission</p>
            <h2 id="mission-title">What do you want to control?</h2>
          </div>
        </header>

        <div class="mission-layout">
          <div class="mission-list" aria-label="Mission choices">
            <button class="mission-card is-selected" type="button" data-mission="eva">
              <span>EVA</span>
              <strong>Astronaut EVA</strong>
              <small>High radiation exposure during spacewalk operations.</small>
            </button>

            <button class="mission-card" type="button" data-mission="iss">
              <span>ISS</span>
              <strong>ISS Orbit</strong>
              <small>Protect crew systems and low Earth orbit communications.</small>
            </button>

            <button class="mission-card" type="button" data-mission="artemis">
              <span>MOON</span>
              <strong>Artemis Capsule</strong>
              <small>Manage crew safety during a lunar transit window.</small>
            </button>

            <button class="mission-card" type="button" data-mission="mars">
              <span>MARS</span>
              <strong>Mars Transfer</strong>
              <small>Balance long-duration exposure, power, and signal delay.</small>
            </button>

            <button class="mission-card" type="button" data-mission="gps">
              <span>GPS</span>
              <strong>GPS Satellite</strong>
              <small>Watch signal reliability during geomagnetic storms.</small>
            </button>

            <button class="mission-card" type="button" data-mission="cubesat">
              <span>CUBE</span>
              <strong>CubeSat</strong>
              <small>Keep a small satellite alive with limited shielding.</small>
            </button>
          </div>

          <section class="viewer-panel" aria-label="Mission 3D preview">
            <div class="viewer-copy">
              <p class="eyebrow">Interactive preview</p>
              <h3 id="viewerTitle">Astronaut EVA</h3>
              <p id="viewerText">Drag the visual to inspect the mission from different angles.</p>
            </div>

            <div class="viewer-frame" id="viewerFrame">
              <div class="orbit orbit-a"></div>
              <div class="orbit orbit-b"></div>
              <div class="mission-model model-eva" id="missionModel" aria-hidden="true">
                <div class="model-shadow"></div>
                <div class="model-part part-main"></div>
                <div class="model-part part-top"></div>
                <div class="model-part part-left"></div>
                <div class="model-part part-right"></div>
                <div class="model-part part-bottom"></div>
              </div>
              <p class="drag-hint">Drag to rotate</p>
            </div>
          </section>
        </div>
      </div>
    </section>
  </main>

  <script type="module" src="./src/app.js"></script>
</body>

</html>
